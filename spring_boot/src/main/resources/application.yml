# ============================================================
# 配置区域 - 在这里修改 API 密钥和网址
# ============================================================
# 
# 【重要】部署到新环境时，请修改以下配置：
# 
# 1. AI 分析配置（默认使用 OpenAI-compatible Chat Completions）
#    - api-url: 聊天补全接口地址
#    - api-key: 通过环境变量 LLM_API_KEY 注入，不要把真实密钥写进仓库
#    - model: 以 OpenAI 或中转站控制台支持的聊天模型名为准
# 
# 2. 服务器端口（可选修改）
#    - port: 后端服务监听端口，默认 8080
#    如果修改端口，需要同步修改前端 test_frontend.html 中的 API_BASE
# 
# 3. 数据库配置（通常不需要改）
#    - 使用 H2 嵌入式数据库，数据存储在 ./data/videodb.mv.db
# 
# 4. 视频上传与 Python 配置（通常不需要改）
#    - upload-dir: 上传的视频存储位置
#    - python-script-dir: Python 字幕提取脚本位置
#    - python-command: Python 可执行文件，Windows 可写完整 python.exe 路径
#    - whisper-*：传给 extract_subtitle_whisperx.py 的 WhisperX 运行参数
# 
# ============================================================

llm:
  api-url: ${LLM_API_URL:https://api.openai.com/v1/chat/completions}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:gpt-4o-mini}
  timeout-sec: ${LLM_TIMEOUT_SEC:120}
  temperature: ${LLM_TEMPERATURE:0.2}
  max-input-chars: ${LLM_MAX_INPUT_CHARS:20000}

# Legacy: 旧 Dify 工作流配置保留用于 /api/test/dify 诊断，不再作为默认主链路。
dify:
  api-url: ${DIFY_API_URL:https://difyonline.58corp.com/v1/workflows/run}
  api-key: ${DIFY_API_KEY:}

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    connection-timeout: 300000

# ============================================================
# 以下配置通常不需要修改
# ============================================================

spring:
  application:
    name: video-analysis
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    url: jdbc:h2:file:./data/videodb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

video:
  upload-dir: ${VIDEO_UPLOAD_DIR:${user.dir}/uploads}
  python-script-dir: ${VIDEO_PYTHON_SCRIPT_DIR:${user.dir}/../}
  python-command: ${VIDEO_PYTHON_COMMAND:python}
  conda-env: ${VIDEO_CONDA_ENV:}
  subtitle-timeout-sec: ${VIDEO_SUBTITLE_TIMEOUT_SEC:600}
  whisper-model: ${WHISPER_MODEL:base}
  whisper-device: ${WHISPER_DEVICE:auto}
  whisper-compute-type: ${WHISPER_COMPUTE_TYPE:}
  whisper-batch-size: ${WHISPER_BATCH_SIZE:16}
  whisper-enable-align: ${WHISPER_ENABLE_ALIGN:true}
  whisper-align-fallback: ${WHISPER_ALIGN_FALLBACK:true}

realtime:
  chunk-timeout-sec: ${REALTIME_CHUNK_TIMEOUT_SEC:180}
  finalize-window-ms: ${REALTIME_FINALIZE_WINDOW_MS:15000}
  max-sessions: ${REALTIME_MAX_SESSIONS:20}

downloader:
  ytdlp-path: ${YTDLP_PATH:yt-dlp}
  ffmpeg-path: ${FFMPEG_PATH:}
  cookies-from-browser: ${DOWNLOADER_COOKIES_FROM_BROWSER:}
  cookies-file: ${DOWNLOADER_COOKIES_FILE:}
  js-runtimes: ${DOWNLOADER_JS_RUNTIMES:}
  sleep-requests-sec: ${DOWNLOADER_SLEEP_REQUESTS_SEC:0}
  proxy: ${DOWNLOADER_PROXY:}
  max-duration-sec: ${DOWNLOADER_MAX_DURATION_SEC:3600}
  max-size-mb: ${DOWNLOADER_MAX_SIZE_MB:500}
  allowed-sites: ${DOWNLOADER_ALLOWED_SITES:bilibili.com,douyin.com,youtube.com,youtu.be}
